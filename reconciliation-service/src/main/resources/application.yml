server:
  port: 8085

spring:
  application:
    name: reconciliation-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/paycore_reconciliation
    username: ${POSTGRES_USER:paycore}
    password: ${POSTGRES_PASSWORD:paycore}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      properties:
        spring.json.add.type.headers: false

paycore:
  payment-service-url: ${PAYMENT_SERVICE_URL:http://localhost:8081}
  ledger-service-url: ${LEDGER_SERVICE_URL:http://localhost:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
